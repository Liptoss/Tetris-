<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ingredient Merge Game</title>
<style>
body {
    background: #222;
    color: white;
    text-align: center;
    font-family: Arial;
}

canvas {
    background: #111;
    margin-top: 20px;
}

</style>
</head>
<body>

<h1>Ingredient Merge Game</h1>
<h2 id="score">Score: 0</h2>

<canvas id="game" width="360" height="420"></canvas>

<script>

const COLS = 6;
const ROWS = 7;
const SIZE = 60;

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let board = [];
let score = 0;

let unlockedLevel = 1;

function createBoard() {
    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
            board[r][c] = 0;
        }
    }
}

class Pair {
    constructor() {
        this.level1 = randomIngredient();
        this.level2 = randomIngredient();
        this.x = 2;
        this.y = 0;
        this.rotation = 0;
    }

    getBlocks() {
        if (this.rotation === 0) return [{x:this.x,y:this.y},{x:this.x,y:this.y-1}];
        if (this.rotation === 1) return [{x:this.x,y:this.y},{x:this.x+1,y:this.y}];
        if (this.rotation === 2) return [{x:this.x,y:this.y},{x:this.x,y:this.y+1}];
        if (this.rotation === 3) return [{x:this.x,y:this.y},{x:this.x-1,y:this.y}];
    }
}

function randomIngredient() {
    return Math.floor(Math.random() * unlockedLevel) + 1;
}

let currentPair;

function spawnPair() {
    currentPair = new Pair();
}

function drawCell(x, y, level) {
    if (level === 0) return;

    const colors = [
        "#2ecc71",
        "#f1c40f",
        "#e67e22",
        "#9b59b6",
        "#27ae60",
        "#e74c3c",
        "#00ffff",
        "#ff00ff"
    ];

    ctx.fillStyle = colors[level-1] || "white";
    ctx.fillRect(x*SIZE, y*SIZE, SIZE-2, SIZE-2);
}

function drawBoard() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let r=0;r<ROWS;r++) {
        for (let c=0;c<COLS;c++) {
            drawCell(c,r,board[r][c]);
        }
    }

    if (currentPair) {
        let blocks = currentPair.getBlocks();
        drawCell(blocks[0].x, blocks[0].y, currentPair.level1);
        drawCell(blocks[1].x, blocks[1].y, currentPair.level2);
    }
}

function collision(dx, dy, rotationChange=0) {
    let newRotation = (currentPair.rotation + rotationChange + 4) % 4;
    let testPair = new Pair();
    testPair.x = currentPair.x + dx;
    testPair.y = currentPair.y + dy;
    testPair.rotation = newRotation;

    let blocks = testPair.getBlocks();

    for (let b of blocks) {
        if (b.x < 0 || b.x >= COLS || b.y >= ROWS) return true;
        if (b.y >= 0 && board[b.y][b.x] !== 0) return true;
    }
    return false;
}

function lockPair() {
    let blocks = currentPair.getBlocks();
    board[blocks[0].y][blocks[0].x] = currentPair.level1;
    board[blocks[1].y][blocks[1].x] = currentPair.level2;
    checkMatches();
    spawnPair();
}

function checkMatches() {
    let visited = Array.from({length:ROWS},()=>Array(COLS).fill(false));

    for (let r=0;r<ROWS;r++){
        for (let c=0;c<COLS;c++){
            if (board[r][c]!==0 && !visited[r][c]){
                let group = [];
                floodFill(r,c,board[r][c],visited,group);
                if (group.length>=3){
                    let level = board[r][c];
                    for (let g of group){
                        board[g.r][g.c]=0;
                    }
                    let newLevel = level+1;
                    unlockedLevel = Math.max(unlockedLevel,newLevel);
                    board[group[0].r][group[0].c]=newLevel;
                    score += Math.pow(3, newLevel-1);
                }
            }
        }
    }

    document.getElementById("score").innerText="Score: "+score;
}

function floodFill(r,c,level,visited,group){
    if (r<0||r>=ROWS||c<0||c>=COLS) return;
    if (visited[r][c]) return;
    if (board[r][c]!==level) return;

    visited[r][c]=true;
    group.push({r,c});

    floodFill(r+1,c,level,visited,group);
    floodFill(r-1,c,level,visited,group);
    floodFill(r,c+1,level,visited,group);
    floodFill(r,c-1,level,visited,group);
}

function update(){
    if (!collision(0,1)){
        currentPair.y++;
    } else {
        lockPair();
    }
}

document.addEventListener("keydown",e=>{
    if (e.key==="ArrowLeft" && !collision(-1,0)) currentPair.x--;
    if (e.key==="ArrowRight" && !collision(1,0)) currentPair.x++;
    if (e.key==="ArrowDown") update();
    if (e.key==="ArrowUp" && !collision(0,0,1)) currentPair.rotation=(currentPair.rotation+1)%4;
});

function gameLoop(){
    update();
    drawBoard();
}

createBoard();
spawnPair();
setInterval(gameLoop,700);

</script>
</body>
</html>
